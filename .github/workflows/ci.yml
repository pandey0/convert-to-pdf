name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    # prisma generate and next build both need DATABASE_URL to be set at module
    # load time (see src/lib/db.mjs), but neither step needs a live database.
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
