services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      worker:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - job_storage:/data
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: node worker/conversion-worker.mjs
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - job_storage:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  job_storage:
