services:
  app:
    command: sh -c "npx prisma migrate deploy && npm run dev -- --hostname 0.0.0.0"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/convert_to_pdf?schema=public
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - job_storage:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - job_storage:/data
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: convert_to_pdf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d convert_to_pdf"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  node_modules:
  postgres_data:
  job_storage:
